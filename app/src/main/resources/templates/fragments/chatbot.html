<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="widget">
<style>
  /* ── Trigger button ── */
  #chatBtn {
    position: fixed; bottom: 28px; right: 28px; z-index: 1000;
    width: 56px; height: 56px; border-radius: 50%;
    background: #00528C; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,82,140,.35);
    display: flex; align-items: center; justify-content: center;
    transition: background .18s, transform .18s;
  }
  #chatBtn:hover { background: #003f6b; transform: scale(1.07); }
  #chatBtn svg { width: 26px; height: 26px; fill: #fff; }
  #chatBtnClose { display: none; }

  /* ── Panel ── */
  #chatPanel {
    position: fixed; bottom: 96px; right: 28px; z-index: 999;
    width: 360px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,.14);
    display: flex; flex-direction: column;
    overflow: hidden;
    max-height: 520px;
    opacity: 0; transform: translateY(16px) scale(.97);
    pointer-events: none;
    transition: opacity .22s ease, transform .22s ease;
  }
  #chatPanel.open {
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: all;
  }

  /* ── Header ── */
  .ch-header {
    background: linear-gradient(135deg, #00528C 0%, #0077cc 100%);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .ch-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }
  .ch-title   { color: #fff; font-size: .95rem; font-weight: 700; font-family: Arial, sans-serif; }
  .ch-sub     { color: rgba(255,255,255,.75); font-size: .75rem; margin-top: 1px; font-family: Arial, sans-serif; }
  .ch-close   {
    margin-left: auto; background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,.8); font-size: 1.3rem; line-height: 1;
    padding: 4px; border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .ch-close:hover { color: #fff; background: rgba(255,255,255,.15); }

  /* ── Messages ── */
  .ch-msgs {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    display: flex; flex-direction: column; gap: 10px;
    background: #f5f7fa;
    scroll-behavior: smooth;
  }
  .ch-msgs::-webkit-scrollbar { width: 4px; }
  .ch-msgs::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 4px; }

  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: .84rem; line-height: 1.5;
    font-family: Arial, sans-serif;
  }
  .msg.bot  .msg-bubble { background: #fff; color: #111; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .msg.user .msg-bubble { background: #00528C; color: #fff; border-bottom-right-radius: 4px; }
  .msg-bubble b { font-weight: 700; }

  /* ── Typing indicator ── */
  .typing-dots {
    display: flex; gap: 4px; padding: 12px 16px;
    background: #fff; border-radius: 14px; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07); align-self: flex-start;
  }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: #b0bec5;
    animation: bounce .9s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: .18s; }
  .typing-dots span:nth-child(3) { animation-delay: .36s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* ── Quick replies ── */
  .ch-chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
    align-self: flex-start;
  }
  .ch-chip {
    padding: 5px 12px; border: 1.5px solid #d0e4f5; border-radius: 50px;
    background: #fff; color: #00528C; font-size: .78rem; font-weight: 700;
    cursor: pointer; font-family: Arial, sans-serif;
    transition: background .15s, border-color .15s;
  }
  .ch-chip:hover { background: #e8f1fb; border-color: #00528C; }

  /* ── Input ── */
  .ch-input-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; border-top: 1px solid #edf0f4;
    background: #fff; flex-shrink: 0;
  }
  #chatInput {
    flex: 1; border: 1.5px solid #d7dce4; border-radius: 50px;
    padding: 9px 14px; font-size: .86rem; outline: none;
    font-family: Arial, sans-serif; color: #111; background: #f8fafc;
    transition: border-color .15s;
  }
  #chatInput:focus { border-color: #00528C; background: #fff; }
  #chatInput::placeholder { color: #aab2be; }
  #chatSend {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: #00528C; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  #chatSend:hover { background: #003f6b; }
  #chatSend svg { width: 16px; height: 16px; fill: #fff; }
</style>

<!-- Floating button -->
<button id="chatBtn" onclick="toggleChat()" aria-label="Abrir asistente">
  <svg id="chatBtnOpen"  viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
  <svg id="chatBtnClose" viewBox="0 0 24 24" style="display:none"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- Chat panel -->
<div id="chatPanel">
  <div class="ch-header">
    <div class="ch-avatar">🦆</div>
    <div>
      <div class="ch-title">Asistente Ducky</div>
      <div class="ch-sub">Biblioteca · Siempre disponible</div>
    </div>
    <button class="ch-close" onclick="toggleChat()">&#10005;</button>
  </div>

  <div class="ch-msgs" id="chatMsgs"></div>

  <div class="ch-input-row">
    <input id="chatInput" type="text" placeholder="Escribe tu pregunta..."
           onkeydown="if(event.key==='Enter')enviar()">
    <button id="chatSend" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
(function() {
  const CHIPS_INIT = [
    '¿Qué es un préstamo?',
    '¿Cuánto dura un préstamo?',
    '¿Cómo devuelvo un libro?',
    'Ver estadísticas',
    'Multas y cargos',
  ];

  let abierto = false;
  let iniciado = false;

  window.toggleChat = function() {
    abierto = !abierto;
    document.getElementById('chatPanel').classList.toggle('open', abierto);
    document.getElementById('chatBtnOpen').style.display  = abierto ? 'none'  : 'block';
    document.getElementById('chatBtnClose').style.display = abierto ? 'block' : 'none';
    if (abierto && !iniciado) { iniciado = true; bienvenida(); }
    if (abierto) setTimeout(() => document.getElementById('chatInput').focus(), 220);
  };

  function bienvenida() {
    agregarMensaje('¡Hola! 👋 Soy el <b>Asistente Ducky</b>. Puedo responder preguntas sobre préstamos, devoluciones, multas y más. ¿En qué te ayudo?', 'bot', false);
    agregarChips(CHIPS_INIT);
  }

  window.enviar = function() {
    const input = document.getElementById('chatInput');
    const texto = input.value.trim();
    if (!texto) return;
    input.value = '';
    agregarMensaje(texto, 'user');
    mostrarTyping();
    fetch('/chatbot/mensaje', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ texto })
    })
    .then(r => r.json())
    .then(data => { quitarTyping(); agregarMensaje(data.respuesta, 'bot'); })
    .catch(() => { quitarTyping(); agregarMensaje('Hubo un error al conectar con el asistente. Intenta de nuevo.', 'bot'); });
  };

  function agregarMensaje(html, tipo, scroll = true) {
    const msgs = document.getElementById('chatMsgs');
    const div  = document.createElement('div');
    div.className = 'msg ' + tipo;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = html;
    div.appendChild(bubble);
    msgs.appendChild(div);
    if (scroll) msgs.scrollTop = msgs.scrollHeight;
  }

  function agregarChips(chips) {
    const msgs = document.getElementById('chatMsgs');
    const row  = document.createElement('div');
    row.className = 'ch-chips';
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'ch-chip';
      btn.textContent = c;
      btn.onclick = () => {
        row.remove();
        document.getElementById('chatInput').value = c;
        enviar();
      };
      row.appendChild(btn);
    });
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  let typingEl = null;
  function mostrarTyping() {
    const msgs = document.getElementById('chatMsgs');
    typingEl = document.createElement('div');
    typingEl.className = 'typing-dots';
    typingEl.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(typingEl);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function quitarTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }
})();
</script>
</div>
</body>
</html>
