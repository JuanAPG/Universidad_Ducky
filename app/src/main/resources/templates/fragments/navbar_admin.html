<nav th:fragment="sidebar(usuario)"
     style="height:100vh; width:130px; background:#B57900; display:flex; flex-direction:column;
            align-items:center; padding:16px 0 24px; flex-shrink:0; overflow-y:auto;">

    <!-- Logo -->
    <div style="width:100%; display:flex; justify-content:center; padding:8px 0 32px; overflow:hidden;">
        <img th:src="@{/images/Logo.png}"
             src="../../../static/images/Logo.png"
             alt="Logo"
             style="height:130px; width:auto;">
    </div>

    <!-- Spacer -->
    <div style="flex:1;"></div>

    <!-- User profile + logout at bottom -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px; padding:0 12px; width:100%;">
        <div style="width:50px; height:50px; border-radius:50%; border:2px solid rgba(255,255,255,0.7);
                    display:flex; align-items:center; justify-content:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="white" viewBox="0 0 24 24">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
        </div>
        <span th:text="${usuario.nombre + ' ' + usuario.apellidos}"
              style="color:#fff; font-size:0.72rem; font-weight:700; text-align:center; line-height:1.3;">
            Usuario
        </span>
        <form th:action="@{/logout}" method="post" style="width:100%;">
            <button type="submit"
                    style="width:100%; padding:8px 0; border:2px solid rgba(255,255,255,0.8); border-radius:10px;
                           background:transparent; color:#fff; font-size:0.75rem; font-weight:700;
                           cursor:pointer; letter-spacing:0.3px;">
                Cerrar sesi&oacute;n
            </button>
        </form>
    </div>

</nav>
