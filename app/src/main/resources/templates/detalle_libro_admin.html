<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Libro – Libreria Ducky</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f4f7;
            color: #111;
            display: flex;
            min-height: 100vh;
        }

        .main-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: #fff;
            border-bottom: 1px solid #e2e6ed;
        }

        .topbar-search {
            flex: 1;
            display: flex;
            align-items: center;
            border: 1.5px solid #d7dce4;
            border-radius: 50px;
            padding: 0 16px;
            height: 44px;
            background: #f8fafc;
            gap: 10px;
        }

        .topbar-search input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            outline: none;
            color: #111;
        }

        .topbar-search input::placeholder { color: #9aa3b2; }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #555;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .filter-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid #d7dce4;
            background: #f8fafc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #555;
            flex-shrink: 0;
        }

        .content {
            flex: 1;
            padding: 32px;
        }

        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 40px 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            max-width: 860px;
        }

        .form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            gap: 12px;
        }

        .form-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #6c757d;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-back:hover { background: #5a6268; }

        .btn-edit {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #00528C;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-edit:hover { background: #003f6b; }

        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #222;
        }

        .field-group input,
        .field-group select,
        .field-group textarea {
            width: 100%;
            padding: 0 14px;
            border: 1.5px solid #d7dce4;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #555;
            background: #eef0f3;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            cursor: not-allowed;
        }

        .field-group input,
        .field-group select { height: 46px; }

        .field-group textarea {
            height: auto;
            padding: 10px 14px;
            resize: none;
            font-family: inherit;
        }

        .field-group select {
            background-image: none;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .autor-slot {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .autor-slot select { flex: 1; }

        @media (max-width: 640px) {
            .row-2 { grid-template-columns: 1fr; }
            .form-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar_admin :: sidebar(usuario=${usuario})}"></div>

    <div class="main-col">
        <div class="topbar">
            <div class="topbar-search">
                <button class="icon-btn" type="button">&#9776;</button>
                <input type="text" placeholder="Consulta libros">
                <button class="icon-btn" type="button">&#128269;</button>
            </div>
            <button class="filter-btn" type="button">&#8801;</button>
        </div>

        <div class="content">
            <div class="form-card">
                <div class="form-header">
                    <h1>Detalle del Libro</h1>
                    <div class="header-actions">
                        <a class="btn-back" href="/libros">&#8592; Volver</a>
                        <a class="btn-edit" th:href="@{/libros/editar/{id}(id=${libro.id})}">&#9998; Editar</a>
                    </div>
                </div>

                <!-- Título -->
                <div class="field-group">
                    <label>T&iacute;tulo del libro</label>
                    <input type="text" th:value="${libro.nombre}" disabled>
                </div>

                <!-- Autores -->
                <div class="field-group">
                    <label>Autor(es)</label>
                    <div th:each="aid : ${autorIdsActuales}" class="autor-slot">
                        <select disabled>
                            <option th:each="a : ${autores}"
                                    th:value="${a['id_autor']}"
                                    th:text="${a['nombre']}"
                                    th:selected="${a['id_autor'] == aid}">Autor</option>
                        </select>
                    </div>
                    <div class="autor-slot" th:if="${#lists.isEmpty(autorIdsActuales)}">
                        <select disabled>
                            <option selected>Sin autor registrado</option>
                        </select>
                    </div>
                </div>

                <!-- Editorial -->
                <div class="field-group">
                    <label>Editorial</label>
                    <select disabled>
                        <option th:each="e : ${editoriales}"
                                th:value="${e['id_editorial']}"
                                th:text="${e['nombre']}"
                                th:selected="${e['id_editorial'] == libro.idEditorial}">Editorial</option>
                    </select>
                </div>

                <!-- ISBN -->
                <div class="field-group">
                    <label>ISBN</label>
                    <input type="text" th:value="${libro.isbn != null ? libro.isbn : '–'}" disabled>
                </div>

                <!-- Sinopsis -->
                <div class="field-group">
                    <label>Sin&oacute;psis</label>
                    <textarea rows="3" disabled
                              th:text="${libro.sinopsis != null ? libro.sinopsis : 'Sin descripción.'}"></textarea>
                </div>

                <!-- Año | Páginas | Precio -->
                <div class="row-2" style="grid-template-columns:1fr 1fr 1fr; margin-bottom:20px;">
                    <div class="field-group" style="margin-bottom:0;">
                        <label>A&ntilde;o de publicaci&oacute;n</label>
                        <input type="text" th:value="${libro.anio != 0 ? libro.anio : '–'}" disabled>
                    </div>
                    <div class="field-group" style="margin-bottom:0;">
                        <label>N&uacute;mero de p&aacute;ginas</label>
                        <input type="text" th:value="${libro.numPaginas != null ? libro.numPaginas : '–'}" disabled>
                    </div>
                    <div class="field-group" style="margin-bottom:0;">
                        <label>Precio</label>
                        <input type="text" th:value="${libro.precio != null ? '$' + libro.precio : '–'}" disabled>
                    </div>
                </div>

                <!-- Categoría | Copias -->
                <div class="row-2">
                    <div class="field-group" style="margin-bottom:0;">
                        <label>Categor&iacute;a</label>
                        <select disabled>
                            <option th:each="t : ${tipos}"
                                    th:value="${t}"
                                    th:text="${t}"
                                    th:selected="${t == libro.tipo}">Tipo</option>
                        </select>
                    </div>
                    <div class="field-group" style="margin-bottom:0;">
                        <label>N&uacute;mero de copias</label>
                        <input type="text"
                               th:value="${libro.numCopias} + ' (copias registradas)'"
                               disabled>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
